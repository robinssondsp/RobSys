{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robot Premium</title>

<script type="module"
  src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

<!-- ========================= -->
<!-- BANNER -->
<!-- ========================= -->
<div class="banner" id="banner">
    <img src="{% static 'Banner.jpg' %}" alt="Banner">
</div>

<!-- ========================= -->
<!-- LOGO FUERA DEL BANNER -->
<!-- ========================= -->
<div class="logo-container">
    <img src="{% static 'Logo.png' %}" class="logo" id="logo" alt="Logo">
</div>

<!-- ========================= -->
<!-- CONTENIDO PRINCIPAL -->
<!-- ========================= -->
<div id="app">

    <div class="video-box glass">
        <video src="{% static 'models/video.mp4' %}" controls muted loop></video>
    </div>

    <div class="robot-box">
        <model-viewer 
            src="{% static 'robot.glb' %}"
            camera-controls
            auto-rotate
            exposure="1.1"
            shadow-intensity="0.8"
            environment-image="neutral"
            bounds="tight"
            field-of-view="28deg"
            alt="robot">
        </model-viewer>
    </div>

</div>

<script>
const banner = document.getElementById("banner");

window.addEventListener("scroll", () => {
    if (window.scrollY > 50) {
        banner.classList.add("banner-small");
    } else {
        banner.classList.remove("banner-small");
    }
});
</script>

</body>
</html>
