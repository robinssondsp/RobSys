{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robot Premium</title>

<script type="module"
  src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

<img src="{% static 'Logo.png' %}" class="logo fade-in" alt="Logo">

<div class="banner fade-in">
    <img src="{% static 'Banner.jpg' %}" alt="Banner">
</div>

<div id="app">

    <div class="video-box fade-up">
        <video src="{% static 'models/video.mp4' %}" 
               controls 
               muted 
               loop>
        </video>
    </div>

    <div class="robot-box fade-up-delay">
        <model-viewer 
            src="{% static 'robot.glb' %}"
            camera-controls
            disable-zoom
            auto-rotate
            auto-rotate-delay="0"
            rotation-per-second="20deg"
            exposure="1.2"
            shadow-intensity="0.8"
            shadow-softness="1"
            environment-image="neutral"
            interaction-prompt="none"
            loading="eager"
            reveal="auto"
            alt="robot">
        </model-viewer>
    </div>

</div>

</body>
</html>
