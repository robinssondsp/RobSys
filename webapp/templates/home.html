{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robot Premium</title>

<script type="module"
  src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<link rel="stylesheet" href="{% static 'css/style.css' %}">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="banner" id="banner">
    <img src="{% static 'Banner.jpg' %}" alt="Banner">
</div>

<div class="logo-container">
    <img src="{% static 'Logo.png' %}" class="logo" alt="Logo">
</div>

<div id="app">

    <!-- VIDEO -->
    <div class="video-box glass">
        <div class="rpa-overlay">
            <div class="scan-line"></div>
            <div class="data-node node1"></div>
            <div class="data-node node2"></div>
            <div class="data-node node3"></div>

            <div class="micro-data top-left">
                ESCANEANDO VENTAS...
            </div>

            <div class="micro-data bottom-right">
                VALIDANDO FACTURAS
            </div>
        </div>

        <video 
            src="{% static 'models/video.mp4' %}"
            autoplay
            muted
            loop
            playsinline
            preload="auto">
        </video>
    </div>

    <!-- ROBOT -->
    <div class="robot-box">
        <div class="tech-base"></div>

        <model-viewer 
            src="{% static 'robot.glb' %}"
            camera-controls
            auto-rotate
            auto-rotate-delay="0"
            rotation-per-second="12deg"
            exposure="1.05"
            shadow-intensity="0.8"
            environment-image="neutral"
            camera-orbit="0deg 75deg 3m"
            alt="robot">
        </model-viewer>
    </div>

</div>

<script>
const banner = document.getElementById("banner");

window.addEventListener("scroll", () => {
    if (window.scrollY > 50) {
        banner.classList.add("banner-small");
    } else {
        banner.classList.remove("banner-small");
    }
});
</script>

</body>
</html>
